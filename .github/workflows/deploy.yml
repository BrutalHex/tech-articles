name: Deploy VitePress to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Pages setup
        run: node scripts/verify-pages-setup.mjs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26.4.0
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Configure Pages Actions deploy and custom domain
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          CNAME=$(tr -d '\n\r' < docs/public/CNAME)
          if [ -z "${CNAME}" ]; then
            echo "::error::docs/public/CNAME is empty"
            exit 1
          fi
          curl -fsSL -X PUT \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d "{\"build_type\":\"workflow\",\"cname\":\"${CNAME}\"}"
          echo "GitHub Pages configured: build_type=workflow, cname=${CNAME}"

      - name: Install dependencies
        run: npm ci

      - name: Build with VitePress
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4