# Hugo configuration for tech-articles
# https://gohugo.io/getting-started/configuration/

baseURL = "https://tech-articles.brutalhex.com/"   # Change this to your actual subdomain later
languageCode = "en-us"
title = "Tech Articles"
theme = "PaperMod"   # Recommended: https://github.com/adityatelange/hugo-PaperMod

# Enable Git info for lastmod
enableGitInfo = true

# Pagination
paginate = 10
paginatePath = "page"

# Taxonomies for tags and categories
[taxonomies]
  tag = "tags"
  category = "categories"

[params]
  description = "Technical articles, engineering notes, and code samples by BrutalHex"
  author = "BrutalHex"
  # Show reading time, word count, etc.
  ShowReadingTime = true
  ShowWordCount = true
  ShowPostNavLinks = true

  # Social / links (edit as needed)
  [params.socialIcons]
    [[params.socialIcons]]
      name = "github"
      url = "https://github.com/BrutalHex"

[menu]
  [[menu.main]]
    name = "Articles"
    url = "/posts/"
    weight = 1

  [[menu.main]]
    name = "Tags"
    url = "/tags/"
    weight = 2

[markup]
  [markup.highlight]
    style = "monokai"   # Nice code highlighting
    lineNos = true
    lineNumbersInTable = true

  [markup.goldmark.renderer]
    unsafe = true   # Allow raw HTML if needed
